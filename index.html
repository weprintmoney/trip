<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer 2026 ✈️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-label">✈️ 7 Cities · 36 Days</p>
      <h1 class="hero-title" id="trip-name">Summer 2026</h1>
      <p class="hero-dates" id="trip-dates">Jun 26 – Aug 1, 2026</p>
      <div class="hero-crew">
        <span class="crew-dot"></span>
        <span id="trip-crew">Charlcye + Eiman</span>
      </div>
    </div>
    <div class="hero-scroll-hint">
      <span>See the plan</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </div>
  </header>

  <!-- QUICK STATS -->
  <section class="stats-bar">
    <div class="stat">
      <span class="stat-num" id="stat-days">36</span>
      <span class="stat-label">Days</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num" id="stat-cities">7</span>
      <span class="stat-label">Cities</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-num" id="stat-people">2</span>
      <span class="stat-label">People</span>
    </div>
  </section>

  <!-- BOOKING PRIORITY -->
  <section class="booking-section">
    <div class="booking-inner">
      <h3 class="booking-heading">⚡ Book These First</h3>
      <div class="booking-list" id="booking-priority">
        <!-- rendered by script.js -->
      </div>
    </div>
  </section>

  <!-- ITINERARY -->
  <main class="itinerary">
    <h2 class="section-title">The Itinerary</h2>

    <div class="days" id="days-container">
      <!-- Stops are rendered by script.js -->
    </div>
  </main>

  <!-- TIME ZONES -->
  <section class="timezones-section">
    <div class="timezones-inner">
      <h2 class="section-title">Reach Charlcye</h2>
      <p class="section-sub">Drag the slider to find a time that works for everyone.</p>

      <div class="tz-slider-wrap">
        <label class="tz-slider-label">
          <span id="tz-slider-time">12:00 PM</span>
          <span class="tz-slider-hint">Austin time</span>
        </label>
        <input type="range" id="tz-slider" min="0" max="1439" value="720" step="15" />
        <div class="tz-slider-ticks">
          <span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>12am</span>
        </div>
      </div>

      <div class="tz-grid" id="tz-grid">
        <!-- rendered by script.js -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Made with ❤️ for two</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
